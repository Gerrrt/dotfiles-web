  <circle cx="168" cy="176" r="7" fill="#9ece6a"/>
  <text x="210" y="182" font-family="monospace" font-size="18" fill="#565f89">dotfiles — install.sh</text>

  <text x="120" y="270" font-family="monospace" font-size="30" fill="#9ece6a">$ <tspan fill="#c0caf5">git clone .../dotfiles-MacBook && ./bootstrap.sh</tspan></text>
